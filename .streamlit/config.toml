[theme]
# Màu chủ đạo (Nút bấm, thanh trượt...) - Ví dụ mình đổi sang màu Xanh lam đậm
primaryColor = "#1E88E5" 

# Màu nền chính của trang web (Màu xám nhạt cho đỡ chói mắt)
backgroundColor = "#F4F6F9"

# Màu nền của Sidebar và các khung phụ (Trắng tinh)
secondaryBackgroundColor = "#FFFFFF"

# Màu chữ (Xám đen cho sang trọng)
textColor = "#2C3E50"

# Font chữ (Có thể chọn: "sans serif", "serif", hoặc "monospace")
font = "sans serif"